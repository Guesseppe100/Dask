services:
  git:
    image: alpine/git:2.47.1
    container_name: bd_git
    entrypoint: ["/bin/sh", "-c", "tail -f /dev/null"]
    working_dir: /workspace
    volumes:
      - .:/workspace

  postgres:
    image: postgres:15
    profiles: ["core", "airflow", "final"]
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:6
    profiles: ["nosql", "notebooks", "final"]
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    profiles: ["search"]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    profiles: ["search"]
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    profiles: ["airflow", "final"]
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW_UID: ${AIRFLOW_UID}
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USER}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./projects/final-project/dags:/opt/airflow/dags/final-project
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    command: >
      bash -c "airflow db init &&
               airflow users create --role Admin --username ${AIRFLOW_USER} --password ${AIRFLOW_PASSWORD} --firstname Big --lastname Data --email admin@example.com"

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    profiles: ["airflow", "final"]
    restart: unless-stopped
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./projects/final-project/dags:/opt/airflow/dags/final-project
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      - ./spark/jobs:/opt/airflow/spark_jobs
      - ./dask/jobs:/opt/airflow/dask_jobs
    command: webserver

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    profiles: ["airflow", "final"]
    restart: unless-stopped
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./projects/final-project/dags:/opt/airflow/dags/final-project
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      - ./spark/jobs:/opt/airflow/spark_jobs
      - ./dask/jobs:/opt/airflow/dask_jobs
    command: scheduler

  spark-master:
    image: bitnami/spark:3.5
    profiles: ["spark", "final"]
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_WEBUI_PORT=8080
      - SPARK_MASTER_PORT=7077
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      - ./data:/opt/spark/data

  spark-worker:
    image: bitnami/spark:3.5
    profiles: ["spark", "final"]
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=1
    depends_on:
      - spark-master
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      - ./data:/opt/spark/data

  dask-scheduler:
  image: daskdev/dask:latest
  profiles: ["dask", "final"]
  command: dask scheduler
  ports:
    - "8786:8786"
    - "8787:8787"
  volumes:
    - ./dask/jobs:/app/dask/jobs
    - ./data:/app/data

  dask-worker:
  image: daskdev/dask:latest
  profiles: ["dask", "final"]
  command: dask worker tcp://dask-scheduler:8786
  depends_on:
    - dask-scheduler
  environment:
    - DASK_DISTRIBUTED__WORKER__MEMORY__TARGET=0.8
  volumes:
    - ./dask/jobs:/app/dask/jobs
    - ./data:/app/data
  jupyter:
    build:
      context: .
      dockerfile: docker/jupyter/Dockerfile
    profiles: ["notebooks", "final"]
    ports:
      - "8888:8888"
    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN}
      JUPYTER_ENABLE_LAB: "yes"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data
      - ./spark/jobs:/home/jovyan/spark_jobs
      - ./dask/jobs:/home/jovyan/dask_jobs
    depends_on:
      - dask-scheduler
      - mongo

volumes:
  postgres_data:
  mongo_data:
  airflow_logs:
  airflow_plugins:
  es_data:
